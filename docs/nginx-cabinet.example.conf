# Пример: cabinet.datagon.ru → Laravel (или процесс) на localhost:3002
# datagon.ru (маркетинг) — отдельный server / порт 3001, см. nginx-redbox.example.conf

upstream cabinet_datagon {
    server 127.0.0.1:3002;
}

server {
    listen 80;
    listen [::]:80;
    server_name cabinet.datagon.ru;

    # SSL — по политике хостинга (certbot / панель)

    location / {
        proxy_pass http://cabinet_datagon;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
