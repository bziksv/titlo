# Пример: marketing-сайт → Next.js на localhost:3001
# server_name: datagon.ru (VPS: /var/www/datagon_ru_usr/data/www/datagon.ru) или redbox.su
# Скопировать в sites-available, подставить пути к SSL-сертификатам.

upstream datagon_marketing {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name redbox.su www.redbox.su;
    return 301 https://redbox.su$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name redbox.su www.redbox.su;

    # ssl_certificate     /etc/letsencrypt/live/redbox.su/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/redbox.su/privkey.pem;

    if ($host = www.redbox.su) {
        return 301 https://redbox.su$request_uri;
    }

    location / {
        proxy_pass http://datagon_marketing;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/health/ {
        proxy_pass http://datagon_marketing;
        access_log off;
    }
}
