# Маркетинг titlo.ru → Next.js на localhost:3003
# VPS 155.212.171.103, путь: /var/www/titlo_ru_usr/data/www/titlo.ru
# PM2: titlo-site (npm start, PORT=3003)
# datagon.ru остаётся на :3001 — порты не смешивать.

upstream titlo_marketing {
    server 127.0.0.1:3003;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name titlo.ru www.titlo.ru;
    return 301 https://titlo.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name titlo.ru www.titlo.ru;

    # ssl_certificate     /etc/letsencrypt/live/titlo.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/titlo.ru/privkey.pem;

    if ($host = www.titlo.ru) {
        return 301 https://titlo.ru$request_uri;
    }

    location / {
        proxy_pass http://titlo_marketing;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/health/ {
        proxy_pass http://titlo_marketing;
        access_log off;
    }
}
